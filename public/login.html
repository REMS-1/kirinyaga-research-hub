<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kirinyaga Research Hub - Sign In</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Public+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
}
.glass-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
}
.bg-academic-texture {
    background-image: linear-gradient(rgba(0,71,37,0.85), rgba(0,33,14,0.95)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuD7lIBfskJwy4BorstxkdamoX0CiP-Aek90I3-5SZ8REiYbYe_YtCFFR9_zFqlGXktdYT6wzyxOXJqDvy2bZ8hlruaQl72BR6JI4yimfG04W22qoXzrV2GbYkisgyplJ3U3oGWm6G6X1rJByuiQxOjdAYCxMcCTp2_MzVqudZntyDFcrAeIt3FO-ym3eBrGD6DoPn8ByDPj3m0ib94rNS-X298fKQqsfK_P5CiYoSTfRFmBNduizOy8t40d_J7MDTF9ENMYZCx7A5Ob');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}
</style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-transparent py-6 px-8 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <span class="text-2xl font-extrabold tracking-tighter font-headline text-white">Kirinyaga Research Hub</span>
  </div>
  <a class="text-emerald-100/80 hover:text-white font-label flex items-center gap-2 transition-colors" href="index.html">
    <span class="material-symbols-outlined text-sm">arrow_back</span>
    Back to Portal
  </a>
</header>

<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-6 bg-academic-texture">
<div class="w-full max-w-2xl">

  <div class="glass-card rounded-xl overflow-hidden shadow-2xl p-8 md:p-12">

    <div class="mb-10 space-y-2">
      <span class="label-md uppercase tracking-widest text-secondary-fixed font-bold">Institutional Access</span>
      <h1 class="text-4xl font-headline font-extrabold text-white tracking-tight">Sign In</h1>
      <p class="text-emerald-100/70 font-light leading-relaxed">Access your researcher account securely to continue collaborating on Kirinyaga Research Hub.</p>
    </div>

    <form id="loginForm" class="space-y-6">

      <!-- Email -->
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-emerald-50 tracking-wide">Institutional Email</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-emerald-300/50">mail</span>
          <input id="email" class="w-full pl-12 pr-4 py-4 bg-white/5 border-0 focus:ring-2 focus:ring-secondary-fixed text-white placeholder-emerald-100/30 rounded-lg transition-all" placeholder="jane.doe@kyu.ac.ke" type="email" required/>
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-emerald-50 tracking-wide">Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-emerald-300/50">lock</span>
          <input id="password" class="w-full pl-12 pr-12 py-4 bg-white/5 border-0 focus:ring-2 focus:ring-secondary-fixed text-white placeholder-emerald-100/30 rounded-lg transition-all" placeholder="••••••••••••" type="password" required/>
          <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-emerald-300/50 hover:text-white transition-colors" onclick="togglePassword()">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>

      <button type="submit" class="w-full py-5 bg-secondary-fixed hover:bg-secondary-container text-on-secondary-fixed font-headline font-bold text-lg rounded-lg shadow-xl shadow-primary/20 transform active:scale-95 transition-all duration-300 mt-4 uppercase tracking-widest">
        Sign In
      </button>

    </form>

    <p class="text-sm text-emerald-100/50 mt-4">
      Don't have an account? <a href="register.html" class="text-white font-bold underline">Register here</a>
    </p>

  </div>
</div>
</main>

<script>
// PASSWORD TOGGLE
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}

// LOGIN FORM
function showToast(msg, duration = 3000) {
    const t = document.createElement("div");
    t.innerText = msg;
    t.className = "fixed bottom-6 right-6 bg-emerald-900 text-white px-6 py-3 rounded-lg shadow-lg z-50 text-sm";
    document.body.appendChild(t);
    setTimeout(() => t.remove(), duration);
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const btn = e.submitter;
  if (btn) { btn.disabled = true; btn.innerText = "Signing in..."; }

  let loggedIn = false;

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const result = await res.json();
    if (res.ok) {
      localStorage.setItem("token", result.token);
      localStorage.setItem("userName", result.name);
      localStorage.setItem("userRole", result.role || "Researcher");
      localStorage.setItem("user", result.name);
      showToast("Welcome back, " + result.name + "!", 5000);
      loggedIn = true;
    } else {
      // Server responded with an error (wrong password, no account etc.) — show real message
      showToast(result.message || "Invalid credentials. Please try again.", 4000);
    }
  } catch (err) {
    // Network error only — server completely unreachable — use offline fallback
    const name = email.split("@")[0].replace(/[._]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    localStorage.setItem("userName", name);
    localStorage.setItem("user", name);
    localStorage.setItem("userRole", "Researcher");
    showToast("Signed in (offline mode). Welcome, " + name + "!", 5000);
    loggedIn = true;
  } finally {
    if (btn) { btn.disabled = false; btn.innerText = "Sign In"; }
    if (loggedIn) setTimeout(() => window.location.href = "dashboard.html", 1200);
  }
});
</script>

</body>
</html>
