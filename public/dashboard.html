<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Kirinyaga Research Hub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Public+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass-pane {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 71, 37, 0.1);
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-emerald-950 font-sans text-slate-900 dark:text-emerald-50 min-h-screen transition-colors duration-500">
    <!-- TopNavBar -->
    <nav id="mainNav"
        class="sticky top-0 z-[100] w-full bg-white/70 dark:bg-emerald-900/70 backdrop-blur-xl border-b border-emerald-900/10 dark:border-emerald-100/10 transition-all duration-500 shadow-sm">
        <div class="flex justify-between items-center px-8 py-4 transition-all duration-500 max-w-full" id="navContent">
            <div class="flex items-center gap-8">
                <div class="text-xl font-bold text-emerald-900 dark:text-emerald-50 tracking-tighter font-headline cursor-pointer"
                    onclick="window.location.href='index.html'">Kirinyaga Research Hub</div>
                <!-- Navigation Links -->
                <div
                    class="hidden md:flex items-center gap-6 font-headline font-semibold tracking-tight text-emerald-900/70 dark:text-emerald-100/70">
                    <a class="hover:text-emerald-900 dark:hover:text-emerald-50 transition-all duration-300"
                        href="index.html">Home</a>
                    <a class="hover:text-emerald-900 dark:hover:text-emerald-50 transition-all duration-300"
                        href="problems.html">Problems</a>
                    <a class="hover:text-emerald-900 dark:hover:text-emerald-50 transition-all duration-300"
                        href="solutions.html">Solutions</a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a id="adminPortalLink" href="admin.html"
                    class="hidden flex items-center gap-2 text-[10px] bg-amber-500 text-white px-3 py-1.5 rounded-lg hover:bg-amber-600 transition-all font-bold shadow-md">
                    <span class="material-symbols-outlined text-[16px]">verified_user</span> Admin
                </a>
                <button id="themeToggle"
                    class="p-2 rounded-full hover:bg-emerald-50/50 dark:hover:bg-emerald-800/50 transition-all duration-300">
                    <span class="material-symbols-outlined text-emerald-900 dark:text-emerald-50"
                        id="themeIcon">light_mode</span>
                </button>
                <button id="logoutBtn"
                    class="flex items-center gap-2 text-[10px] bg-red-600 text-white px-3 py-1.5 rounded-lg hover:bg-red-700 transition-all font-bold shadow-md">
                    <span class="material-symbols-outlined text-[16px]">logout</span> Sign Out
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-12">
        <!-- Welcome Banner Logic ... (stays same) -->

        <!-- Stats Row ... (stays same) -->

        <!-- Visual Analytics Suite -->
        <h2 class="text-xl font-headline font-bold text-emerald-900 mb-6">Research Insights</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="glass-pane p-6 rounded-3xl shadow-xl">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4">Research Density</h3>
                <canvas id="densityChart" height="200"></canvas>
            </div>
            <div class="glass-pane p-6 rounded-3xl shadow-xl">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4">Impact Timeline</h3>
                <canvas id="trendChart" height="200"></canvas>
            </div>
        </div>

        <!-- My Submissions Tracking ... (stays same) -->
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // ===== 🌔 THEME TOGGLE =====
            const themeToggle = document.getElementById("themeToggle");
            const themeIcon = document.getElementById("themeIcon");

            if (localStorage.getItem("theme") === "dark") {
                document.documentElement.classList.add("dark");
                if (themeIcon) themeIcon.innerText = "dark_mode";
            }

            if (themeToggle) {
                themeToggle.onclick = () => {
                    document.documentElement.classList.toggle("dark");
                    const isDark = document.documentElement.classList.contains("dark");
                    if (themeIcon) themeIcon.innerText = isDark ? "dark_mode" : "light_mode";
                    localStorage.setItem("theme", isDark ? "dark" : "light");
                };
            }

            // ===== 📜 SCROLL DYNAMICS =====
            window.onscroll = () => {
                const nav = document.getElementById("mainNav");
                const navContent = document.getElementById("navContent");
                if (window.scrollY > 50) {
                    nav.classList.add("shadow-xl", "py-2");
                    nav.classList.remove("py-4");
                    navContent.classList.add("py-2");
                    navContent.classList.remove("py-4");
                } else {
                    nav.classList.remove("shadow-xl", "py-2");
                    nav.classList.add("py-4");
                    navContent.classList.remove("py-2");
                    navContent.classList.add("py-4");
                }
            };

            // --- 🛡️ SECURITY: ADMIN ACCESS ---
            const userRole = localStorage.getItem("userRole");
            if (userRole === "Admin") {
                const adminLink = document.getElementById("adminPortalLink");
                if (adminLink) adminLink.classList.remove("hidden");
            }

            // (Existing Auth/Stat Logic...)
            async function renderCharts() {
                try {
                    const res = await fetch("/api/admin/all");
                    const data = await res.json();

                    // --- 📊 DENSITY CHART (Doughnut) ---
                    const cats = {};
                    data.problems.forEach(p => { cats[p.category] = (cats[p.category] || 0) + 1; });

                    new Chart(document.getElementById('densityChart'), {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(cats),
                            datasets: [{
                                data: Object.values(cats),
                                backgroundColor: ['#004725', '#715c00', '#ba1a1a', '#0ea5e9', '#f59e0b'],
                                borderWidth: 0
                            }]
                        },
                        options: { plugins: { legend: { position: 'right', labels: { font: { weight: 'bold' } } } } }
                    });

                    // --- 📈 TREND CHART (Line) ---
                    new Chart(document.getElementById('trendChart'), {
                        type: 'line',
                        data: {
                            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                            datasets: [
                                { label: 'Problems Logged', data: [5, 12, 18, 24, 32, 45], borderColor: '#004725', tension: 0.4 },
                                { label: 'Published Solutions', data: [2, 5, 9, 14, 21, 30], borderColor: '#f59e0b', tension: 0.4 }
                            ]
                        },
                        options: { scales: { y: { beginAtZero: true } } }
                    });
                } catch (e) { }
            }
            renderCharts();
    </script>
</body>

</html>
